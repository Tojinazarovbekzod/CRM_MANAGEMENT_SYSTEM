{% extends 'base.html' %}
{% block title %}Login — Brew & Bloom{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-20 px-4 bg-coffee-50">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- Header -->
            <div class="bg-coffee-950 px-8 py-8 text-center">
                <div class="w-14 h-14 bg-coffee-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
                    </svg>
                </div>
                <h1 class="text-white text-2xl font-bold">Kirish</h1>
                <p class="text-coffee-300 text-sm mt-1">Hisobingizga kiring</p>
            </div>

            <!-- Form -->
            <div class="px-8 py-8">
                {% if messages %}
                    {% for message in messages %}
                        <div class="mb-4 px-4 py-3 rounded-lg text-sm
                            {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
                            {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" name="username" autocomplete="username"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-coffee-400 focus:border-transparent transition"
                            placeholder="Username">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Parol</label>
                        <input type="password" name="password" autocomplete="current-password"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-coffee-400 focus:border-transparent transition"
                            placeholder="Parol">
                    </div>

                    <button type="submit"
                        class="w-full btn-coffee text-white py-3 rounded-xl font-semibold text-sm tracking-wide">
                        Kirish
                    </button>
                </form>

                <p class="text-center text-sm text-gray-500 mt-6">
                    Hisobingiz yo'qmi?
                    <a href="{% url 'register' %}" class="text-coffee-600 hover:text-coffee-800 font-medium">Ro'yxatdan o'ting</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
