# ═══════════════════════════════════════════════════════════════════
#  GitHub Secrets sozlash (Settings → Secrets → Actions):
#
#  EC2_HOST          — EC2 public IP yoki domain (masalan: 54.12.34.56)
#  EC2_USER          — SSH foydalanuvchi (Ubuntu AMI uchun: ubuntu)
#  EC2_SSH_KEY       — .pem formatidagi private SSH kalit (to'liq matn)
#  DOCKER_USERNAME   — Docker Hub username
#  DOCKER_PASSWORD   — Docker Hub access token
#  DJANGO_SECRET_KEY — Django secret key (50+ tasodifiy belgi)
#  ALLOWED_HOSTS     — Vergul bilan: 54.12.34.56,yourdomain.com
#  DB_NAME           — Baza nomi (masalan: coffee_db)
#  DB_USER           — Baza foydalanuvchisi (masalan: coffee_user)
#  DB_PASSWORD       — Baza paroli
#  DB_ROOT_PASSWORD  — MariaDB root paroli
# ═══════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/coffee-restaurant
  DEPLOY_DIR: /opt/coffee-restaurant

jobs:
  # ─── 1. Docker image build qilish va Docker Hub ga push ───────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub ga login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Metadata tayyorlash
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build va push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── 2. EC2 ga deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Server sozlash va deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            DEPLOY_DIR="/opt/coffee-restaurant"
            REPO_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

            echo "════════════════════════════════════════"
            echo " BOSQICH 1: Docker o'rnatish"
            echo "════════════════════════════════════════"
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
              sudo sh /tmp/get-docker.sh
              sudo usermod -aG docker "$USER"
              rm -f /tmp/get-docker.sh
              echo "✓ Docker o'rnatildi"
            else
              echo "✓ Docker allaqachon mavjud: $(docker --version 2>/dev/null || sudo docker --version)"
            fi

            echo "════════════════════════════════════════"
            echo " BOSQICH 2: Docker servisini ishga tushirish"
            echo "════════════════════════════════════════"
            sudo systemctl enable --quiet docker
            sudo systemctl start docker
            echo "✓ Docker servis faol"

            echo "════════════════════════════════════════"
            echo " BOSQICH 3: Docker Compose plugin o'rnatish"
            echo "════════════════════════════════════════"
            if ! sudo docker compose version &>/dev/null 2>&1; then
              echo "Docker Compose plugin o'rnatilmoqda..."
              COMPOSE_VER=$(curl -fsSL "https://api.github.com/repos/docker/compose/releases/latest" \
                | grep '"tag_name"' | head -1 | sed 's/.*"v\([^"]*\)".*/\1/')
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL \
                "https://github.com/docker/compose/releases/download/v${COMPOSE_VER}/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              echo "✓ Docker Compose v${COMPOSE_VER} o'rnatildi"
            else
              echo "✓ Docker Compose allaqachon mavjud"
            fi

            echo "════════════════════════════════════════"
            echo " BOSQICH 4: Git o'rnatish"
            echo "════════════════════════════════════════"
            if ! command -v git &>/dev/null; then
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends git
              echo "✓ Git o'rnatildi"
            else
              echo "✓ Git allaqachon mavjud"
            fi

            echo "════════════════════════════════════════"
            echo " BOSQICH 5: Repo clone / pull"
            echo "════════════════════════════════════════"
            sudo mkdir -p "${DEPLOY_DIR}"
            sudo chown -R "$USER:$USER" "${DEPLOY_DIR}"

            if [ -d "${DEPLOY_DIR}/.git" ]; then
              git -C "${DEPLOY_DIR}" remote set-url origin "${REPO_URL}"
              git -C "${DEPLOY_DIR}" fetch origin main --quiet
              git -C "${DEPLOY_DIR}" reset --hard origin/main
              git -C "${DEPLOY_DIR}" remote set-url origin \
                "https://github.com/${{ github.repository }}.git"
              echo "✓ Repo yangilandi"
            else
              git clone --depth 1 "${REPO_URL}" "${DEPLOY_DIR}"
              git -C "${DEPLOY_DIR}" remote set-url origin \
                "https://github.com/${{ github.repository }}.git"
              echo "✓ Repo clone qilindi"
            fi

            echo "════════════════════════════════════════"
            echo " BOSQICH 6: .env fayl yaratish"
            echo "════════════════════════════════════════"
            cat > "${DEPLOY_DIR}/.env" << 'ENV_EOF'
            DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/coffee-restaurant
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            CSRF_TRUSTED_ORIGINS=http://${{ secrets.EC2_HOST }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            ENV_EOF
            chmod 600 "${DEPLOY_DIR}/.env"
            echo "✓ .env fayl yaratildi (chmod 600)"

            echo "════════════════════════════════════════"
            echo " BOSQICH 7: Docker image pull qilish"
            echo "════════════════════════════════════════"
            echo "${{ secrets.DOCKER_PASSWORD }}" \
              | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            sudo docker pull "${{ secrets.DOCKER_USERNAME }}/coffee-restaurant:latest"
            echo "✓ Image pull qilindi"

            echo "════════════════════════════════════════"
            echo " BOSQICH 8: Docker Compose bilan deploy"
            echo "════════════════════════════════════════"
            cd "${DEPLOY_DIR}"
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "✓ Konteynerlar ishga tushdi"

            echo "════════════════════════════════════════"
            echo " BOSQICH 9: Holat tekshirish"
            echo "════════════════════════════════════════"
            sleep 15
            sudo docker compose -f docker-compose.prod.yml ps

            echo "════════════════════════════════════════"
            echo " BOSQICH 10: Eski image'larni tozalash"
            echo "════════════════════════════════════════"
            sudo docker image prune -f
            sudo docker logout
            echo "✓ Tozalash bajarildi"

            echo ""
            echo "🚀 DEPLOY MUVAFFAQIYATLI YAKUNLANDI!"
            echo "   URL: http://${{ secrets.EC2_HOST }}"
